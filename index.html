<script>
// Definisikan di sini supaya tersedia sebelum HTML body load
function aktifkanAudio(){
  var el=document.getElementById('bel-overlay');
  if(el) el.style.display='none';
  window.audioUnlocked=true;
  window.belOtomatis=true;
  sessionStorage.setItem('bel_unlocked','1');
  // Buat AudioContext SEKARANG — setelah user gesture (klik tombol Mulai)
  try{
    window.audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    window.audioCtx.resume();
    // Play silent buffer untuk benar-benar unlock
    var buf=window.audioCtx.createBuffer(1,1,22050);
    var src=window.audioCtx.createBufferSource();
    src.buffer=buf; src.connect(window.audioCtx.destination); src.start(0);
  }catch(e){ console.log('AudioContext error:',e); }
  var badge=document.getElementById('bel-badge');
  if(badge){badge.textContent='🔔 Bel ON';badge.className='bel-status-badge on';}
  if(window.CFG){
    fetch(CFG.APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'setBelOtomatis',status:'ON'})}).catch(function(){});
  }
  console.log('[BEL] ✅ Aktif! AudioContext state:',window.audioCtx?window.audioCtx.state:'null');
}
// Inisialisasi variabel global — AudioContext JANGAN dibuat di sini
window.audioUnlocked=false;
window.belOtomatis=true;
window.audioCtx=null;
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;600&display=swap');
:root{--font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;--bg:#0f172a;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:auto;}
body{font-family:var(--font);background:var(--bg);color:white;}

/* AUTO SCALE WRAPPER */
#scale-root{transform-origin:top left;}

.outer{min-height:100vh;display:flex;flex-direction:column;padding:12px 18px 10px;gap:8px;}

/* OVERLAY AKTIFKAN BEL */
.bel-overlay{position:fixed;inset:0;z-index:999;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;cursor:pointer;}
.bel-overlay:focus{outline:none;}
.bel-ikon{font-size:80px;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.bel-overlay h2{font-size:32px;font-weight:900;color:#fff;text-align:center;margin:0;}
.bel-overlay p{font-size:18px;color:rgba(255,255,255,0.6);text-align:center;line-height:1.7;margin:0;}
.bel-overlay .hint{font-size:15px;color:rgba(255,255,255,0.35);margin-top:8px;}
.bel-tombol{margin-top:10px;padding:18px 60px;background:#16a34a;color:#fff;border:3px solid #4ade80;border-radius:16px;font-size:20px;font-weight:900;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 0 40px rgba(74,222,128,0.35);animation:glow 2s ease-in-out infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 40px rgba(74,222,128,0.35)}50%{box-shadow:0 0 60px rgba(74,222,128,0.6)}}
.bel-status-badge{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:800;cursor:pointer;border:none;white-space:nowrap;}
.bel-status-badge.on{background:rgba(22,163,74,0.25);color:#4ade80;border:1px solid rgba(22,163,74,0.4);}
.bel-status-badge.off{background:rgba(239,68,68,0.25);color:#f87171;border:1px solid rgba(239,68,68,0.4);}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-left h1{font-size:18px;font-weight:900;letter-spacing:-0.3px;}
.hdr-left p{font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px;display:flex;align-items:center;gap:6px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:blink 1.3s infinite;display:inline-block;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.clock-box{text-align:right;}
.clock-time{font-family:var(--mono);font-size:38px;font-weight:600;color:#4ade80;letter-spacing:2px;line-height:1;}
.clock-date{font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px;}

/* LEGEND */
.legend{display:flex;gap:14px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.55);}
.lb{width:13px;height:13px;border-radius:3px;flex-shrink:0;}
.lb.h{background:#166534;}.lb.m{background:#dc2626;}.lb.mh{background:#7c3aed;}
.lb.k{background:#ca8a04;}.lb.b{background:#1d4ed8;}.lb.a{background:rgba(255,255,255,0.35);}
.lb.dt{background:#7c3aed;}.lb.s{background:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.6);}
.lb.u{background:#8b5cf6;}.lb.o{background:#f97316;}.lb.kc{background:#ea580c;}.lb.ist{background:rgba(96,165,250,0.5);}

/* STATS */
.stats{display:flex;gap:8px;flex-shrink:0;}
.stat{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:800;}
.stat.h{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3);}
.stat.m{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);}
.stat.k{background:rgba(234,179,8,0.15);color:#fbbf24;border:1px solid rgba(234,179,8,0.3);}
.stat.mh{background:rgba(251,113,133,0.15);color:#fb7185;border:1px solid rgba(251,113,133,0.3);}

/* TABLE */
.tbl-wrap{flex:1;overflow:auto;border-radius:12px;min-height:0;}
.tbl-wrap::-webkit-scrollbar{width:3px;height:3px;}
.tbl-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px;}
table{border-collapse:collapse;width:100%;min-width:700px;}
thead th{position:sticky;top:0;z-index:10;background:#1e293b;padding:9px 6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.6px;color:rgba(255,255,255,0.55);border-bottom:1px solid rgba(255,255,255,0.08);text-align:center;}
thead th:first-child{text-align:right;padding-right:12px;min-width:82px;}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);}
tbody tr:hover{background:rgba(255,255,255,0.02);}
td{padding:5px 4px;text-align:center;vertical-align:middle;}
td.sesi{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,0.4);text-align:right;padding-right:12px;white-space:nowrap;line-height:1.7;background:rgba(255,255,255,0.02);}
td.sesi.aktif{color:#4ade80;font-weight:700;}

/* SEL */
.cell{border-radius:7px;padding:6px 4px;min-height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:1px solid transparent;transition:all 0.4s;}
.cell.h{background:#166534;border-color:#16a34a;animation:gh 3s ease-in-out infinite;}
.cell.m{background:#dc2626;border-color:#991b1b;animation:rm 1.8s ease-in-out infinite;cursor:pointer;}
.cell.mh{background:#dc2626;border-color:#991b1b;animation:rm 1.8s ease-in-out infinite;}
.cell.k{background:#ca8a04;border-color:#a16207;}
.cell.b{background:#1d4ed8;border-color:#1e3a8a;}
.cell.a{background:#dc2626;border-color:#991b1b;animation:rm 1.8s ease-in-out infinite;}
.cell.dt{background:#7c3aed;border-color:#6d28d9;} /* ditangani - ungu */
.cell.s{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.12);} /* selesai - abu */
.cell.ist{background:rgba(96,165,250,0.25);border-color:rgba(96,165,250,0.4);} /* istirahat - biru terang */
.cell.kc{background:#ea580c;border-color:#c2410c;}
.kc .cn{color:#fff;font-weight:700;}.kc .cp{color:#fed7aa;}.kc .cj{color:#fff;}
.cell.x{background:transparent;border-color:transparent;}
@keyframes gh{0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}50%{box-shadow:0 0 10px 2px rgba(22,163,74,0.4)}}
@keyframes rm{0%,100%{background:#dc2626}50%{background:#b91c1c}}
.cn{font-size:10px;font-weight:900;line-height:1.2;}
.cp{font-size:8px;line-height:1.1;margin-top:1px;}
.cj{font-family:var(--mono);font-size:7px;margin-top:2px;}
.h .cn{color:#4ade80;font-weight:700;}.h .cp{color:rgba(134,239,172,0.9);}.h .cj{color:#fbbf24;}
.m .cn{color:#fff;font-weight:700;}.m .cp{color:#fecaca;}
.mh .cn{color:#fff;font-weight:700;}.mh .cp{color:#fecaca;}
.k .cn{color:#fff;font-weight:700;}.k .cp{color:#fef08a;}
.b .cn{color:#fff;font-weight:700;}.b .cp{color:#bfdbfe;}
.a .cn{color:#fff;font-weight:700;}.a .cp{color:#fecaca;}
.dt .cn{color:#ddd6fe;font-weight:700;}.dt .cp{color:rgba(221,214,254,0.7);}
.s .cn{color:rgba(255,255,255,0.35);}.s .cp{color:rgba(255,255,255,0.2);}
.handle-mark{font-size:8px;color:#93c5fd;font-weight:700;position:absolute;bottom:4px;right:5px;line-height:1;}

.kgi-bar.insidental{background:rgba(249,115,22,0.15);color:#fdba74;border:1px solid rgba(249,115,22,0.3);}

.footer span{font-size:10px;color:rgba(255,255,255,0.25);font-family:var(--mono);}
</style>

function bunyikanBel(namaFile){
  if(!window.audioUnlocked){
    console.log('[BEL] Belum unlock');
    document.getElementById('bel-overlay').style.display='flex';
    return;
  }
  // Kalau AudioContext belum ada (misal dari sessionStorage) — buat dulu
  if(!window.audioCtx){
    try{
      audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    }catch(e){ console.log('[BEL] Gagal buat AudioContext:',e); }
  }
  try{
    if(window.audioCtx && window.audioCtx.state==='suspended'){
      window.audioCtx.resume().then(()=>playAudio(namaFile));
    } else {
      playAudio(namaFile);
    }
  }catch(e){ console.log('[BEL] Error:',e); }
}

function playAudio(namaFile){
  try{
    const audio=new Audio('https://ipalmiansyah.github.io/Monitor/'+namaFile);
    audio.volume=1.0;
    const playPromise=audio.play();
    if(playPromise){
      playPromise.then(()=>{
        console.log('[BEL] ✅ Bunyi:',namaFile);
      }).catch(e=>{
        console.log('[BEL] Play gagal:',e.name,e.message);
        if(e.name==='NotAllowedError'){
          window.audioUnlocked=false;
          sessionStorage.removeItem('bel_unlocked');
          document.getElementById('bel-overlay').style.display='flex';
        }
      });
    }
  }catch(e){ console.log('[BEL] Audio error:',e); }
}

const nowMin=()=>{const d=new Date();return d.getHours()*60+d.getMinutes();};
const pJam=s=>{const[h,m]=s.split(':').map(Number);return h*60+m;};
const hariIni=()=>new Date().toLocaleDateString('id-ID',{weekday:'long'});
const tglStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const tglStrLokal=(tgl)=>{const d=new Date(tgl+'T00:00:00');return d.toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'});};
const TOLERANSI=5; // menit

function sSesi(s,e){
  const n=nowMin(),sm=pJam(s),em=pJam(e);
  if(n>=em) return 'selesai';
  if(n>=sm+TOLERANSI) return 'berlangsung';
  if(n>=sm) return 'toleransi'; // 5 menit pertama masih biru
  return 'akan';
}
function isKeluarCepat(jamKeluar,jamSelesai){
  if(!jamKeluar||jamKeluar==='-') return false;
  return pJam(jamSelesai)-pJam(jamKeluar)>TOLERANSI;
}
function sortKelas(a,b){const T={I:1,II:2,III:3,IV:4,V:5,VI:6,VII:7,VIII:8,IX:9,X:10,XI:11,XII:12};const p=k=>{const m=k.match(/^([IVXLC]+)-?(.*)$/i);return m?{t:T[m[1].toUpperCase()]||99,s:m[2]||''}:{t:99,s:k};};const pa=p(a),pb=p(b);return pa.t!==pb.t?pa.t-pb.t:pa.s.localeCompare(pb.s);}

async function loadData(){
  // Tampil dulu pakai cache localStorage supaya tidak blank
  const cached=localStorage.getItem('monitor_cache');
  if(cached){
    try{
      const c=JSON.parse(cached);
      dJadwal=c.jadwal||DATA_JADWAL_LOKAL;
      dAbsensi=c.absensi||[];
      dInsidental=c.insidental||[];

      if(c.rutin) dRutin=c.rutin;
      renderGrid(tglDipilih); // tampil langsung dari cache
    }catch(e){}
  } else {
    // Tidak ada cache — tampil dengan data lokal dulu
    dJadwal=DATA_JADWAL_LOKAL;
    renderGrid();
  }

  // Fetch data terbaru di background
  try{
    const r=await fetch(CFG.APPS_SCRIPT_URL+'?action=getData');
    const d=await r.json();
    dJadwal=d.jadwal||DATA_JADWAL_LOKAL;
    dAbsensi=d.absensi||[];
    dInsidental=d.insidental||[];
    dPenanganan=d.penanganan||[];
    if(d.istirahat) dIstirahat=d.istirahat;
    if(d.rutin) dRutin=d.rutin;
    if(typeof d.belOtomatis !== 'undefined'){
      belOtomatis=d.belOtomatis;
      const badge=document.getElementById('bel-badge');
      if(badge){
        badge.textContent = belOtomatis ? '🔔 Bel ON' : '🔕 Bel OFF';
        badge.className = 'bel-status-badge ' + (belOtomatis ? 'on' : 'off');
      }
    }
    // Cek trigger bel dari HP piket
    if(d.belTrigger && d.belTrigger.ts && d.belTrigger.ts !== lastBelTrigger){
      const now = Date.now();
      const tsNum = parseInt(d.belTrigger.ts)||0;
      // Debounce: abaikan trigger > 60 detik yang lalu
      if(now - tsNum < 60000){
        lastBelTrigger = d.belTrigger.ts;
        bunyikanBel(d.belTrigger.suara);
      } else {
        lastBelTrigger = d.belTrigger.ts; // tandai sudah dibaca
      }
      fetch(CFG.APPS_SCRIPT_URL, {method:'POST', body:JSON.stringify({action:'clearBelTrigger'})}).catch(()=>{});
    }
    // Simpan ke cache (kecuali absensi yang sering berubah — simpan semua)
    try{
      localStorage.setItem('monitor_cache', JSON.stringify({
        jadwal:dJadwal, absensi:dAbsensi,
        insidental:dInsidental, penanganan:dPenanganan,
        istirahat:dIstirahat, rutin:dRutin
      }));
    }catch(e){}
  }catch(e){
    // Gagal fetch — tetap pakai yang sudah ditampilkan
  }
  const el=document.getElementById('last-refresh');
  if(el) el.textContent='Update: '+new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  renderGrid(tglDipilih); // render ulang dengan data terbaru
}

// ── CEK BEL OTOMATIS ──
function cekBelOtomatis(){
  if(!belOtomatis) return;
  const hr=hariIni(), tgl=tglStr(), n=nowMin();

  const events=[];

  // Alarm 07:15 — hanya Senin, Jumat, Sabtu, bunyi 1x
  if(['Senin','Jumat','Sabtu'].includes(hr)){
    events.push({menit:pJam('07:15'), suara:SUARA.ALARM, id:'alarm-pagi', ulang:1});
  }

  // Jam pertama pagi
  const jamPertama=dJadwal.filter(j=>j.hari===hr).map(j=>pJam(j.jamMulai)).sort((a,b)=>a-b)[0];
  if(jamPertama!==undefined){
    // Senin/Jumat/Sabtu: jam pertama pakai masuk kelas biasa (alarm sudah bunyi 07:15)
    // Selasa/Rabu/Kamis: jam pertama pakai masuk kelas
    events.push({menit:jamPertama, suara:SUARA.MASUK_PAGI, id:'masuk-pagi'});
  }

  // Istirahat
  dIstirahat.filter(k=>k.hari===hr).forEach(k=>{
    events.push({menit:pJam(k.jamMulai),   suara:SUARA.ISTIRAHAT,  id:'ist-mulai-'+k.jamMulai});
    events.push({menit:pJam(k.jamSelesai), suara:SUARA.MASUK_STLH, id:'ist-selesai-'+k.jamSelesai});
  });

  // Akhir setiap jam pelajaran
  const sesiSet=new Set();
  const semuaJam=dJadwal.filter(j=>j.hari===hr);
  semuaJam.forEach(j=>{
    const key=j.jamSelesai;
    if(sesiSet.has(key)) return;
    sesiSet.add(key);
    const ist=dIstirahat.find(k=>k.hari===hr&&k.jamMulai===j.jamSelesai);
    const isAkhirHari=!semuaJam.find(x=>x.jamMulai===j.jamSelesai);
    if(ist) return;
    if(isAkhirHari){
      const suaraPulang=hr==='Sabtu'?SUARA.PULANG_SABTU:SUARA.PULANG_SENINJUM;
      events.push({menit:pJam(key), suara:suaraPulang, id:'pulang-'+key});
    } else {
      events.push({menit:pJam(key), suara:SUARA.GANTI_JAM, id:'ganti-'+key});
    }
  });

  // Cek event yang tepat pada menit ini (±1 menit toleransi)
  events.forEach(ev=>{
    const selisih=Math.abs(n-ev.menit);
    if(selisih<=1 && !belDimainkan[tgl+'-'+ev.id]){
      belDimainkan[tgl+'-'+ev.id]=true;
      if(ev.ulang && ev.ulang>1){
        // Bunyi pertama
        bunyikanBel(ev.suara);
        // Bunyi kedua setelah jeda sesuai durasi audio (estimasi 60 detik)
        setTimeout(()=>bunyikanBel(ev.suara), 60000);
      } else {
        bunyikanBel(ev.suara);
      }
      // Kirim trigger ke sheet
      fetch(CFG.APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'triggerBel',suara:ev.suara,guruPiket:'AUTO'})}).catch(()=>{});
    }
  });
}

function cekKgiSesi(jm,je,hr,tgl){
  for(const k of dIstirahat){if(k.hari===hr&&k.jamMulai===jm&&k.jamSelesai===je)return{tipe:'istirahat',ket:k.keterangan};}
  for(const k of dRutin){if(k.hari===hr&&k.jamMulai===jm&&k.jamSelesai===je)return{tipe:'rutin',ket:k.keterangan};}
  // Hanya insidental semua guru yang jadi bar penuh
  for(const k of dInsidental){
    if(k.tanggal===tgl&&k.status!=='BATAL'&&k.jamMulai===jm&&k.jamSelesai===je){
      if(!k.berlakuUntuk||k.berlakuUntuk==='semua') return{tipe:'insidental',ket:k.keterangan};
    }
  }
  return null;
}

// Cek apakah guru tertentu punya kegiatan di jam ini
function cekKgiGuru(namaGuru,jm,je,tgl){
  for(const k of dInsidental){
    if(k.tanggal===tgl&&k.status!=='BATAL'&&k.jamMulai===jm&&k.jamSelesai===je&&k.berlakuUntuk==='tertentu'&&k.namaGuru===namaGuru)
      return k;
  }
  return null;
}

function renderGrid(tglOverride){

  const hrRaw = new Date(tglAktif+'T00:00:00');

  const tgl = tglAktif;
  const modeHistori = tglOverride && tglOverride !== tglStr();
  const jh=dJadwal.filter(j=>j.hari===hr);
  const klMap={}, sesiMap={};
  jh.forEach(j=>{klMap[j.kelas]=1; sesiMap[j.jamMulai+'-'+j.jamSelesai]={s:j.jamMulai,e:j.jamSelesai};});
  [...dIstirahat.filter(k=>k.hari===hr),...dRutin.filter(k=>k.hari===hr),...dInsidental.filter(k=>k.tanggal===tgl&&k.status!=='BATAL')]
    .forEach(k=>{const key=k.jamMulai+'-'+k.jamSelesai;if(!sesiMap[key])sesiMap[key]={s:k.jamMulai,e:k.jamSelesai,spOnly:true};});

  const kls=Object.keys(klMap).sort(sortKelas);
  const ses=Object.values(sesiMap).sort((a,b)=>pJam(a.s)-pJam(b.s));

  if(!kls.length&&!ses.length){
    document.getElementById('tbl').innerHTML='<tr><td colspan="99" style="padding:60px;text-align:center;color:rgba(255,255,255,0.25);font-size:15px;font-weight:700">Tidak ada jadwal hari ini</td></tr>';
    return;
  }

  let cntH=0,cntM=0,cntMH=0,cntK=0,cntKC=0;
  // Counter per KELAS — hitung kelas unik berdasarkan status jam yang sedang berlangsung
  const kelasStatus={};
  let nomorSesi=0;
  let html=`<thead><tr><th style="width:20px">No</th><th>Sesi</th>${kls.map(k=>`<th>${k}</th>`).join('')}</tr></thead><tbody>`;

  ses.forEach((si,idx)=>{
    const kgiF=cekKgiSesi(si.s,si.e,hr,tgl);
    if(kgiF){
      let bc='istirahat',ic='☕';
      if(kgiF.tipe==='rutin'){bc='rutin';ic='📣';}
      if(kgiF.tipe==='insidental'){bc='insidental';ic='📌';}
      // Istirahat gunakan class ist untuk warna biru terang
      const stBaris=sSesi(si.s,si.e);
      const clsIst=kgiF.tipe==='istirahat'?(stBaris==='selesai'?'s':'ist'):(kgiF.tipe==='rutin'?'rutin':'insidental');
      html+=`<tr><td class="sesi" style="color:rgba(255,255,255,0.15);font-size:8px;">—</td><td class="sesi">${si.s}<br>${si.e}</td><td colspan="${kls.length}"><div class="kgi-bar ${clsIst}">${ic} ${kgiF.ket}</div></td></tr>`;
      return;
    }
    if(si.spOnly) return;

    nomorSesi++;
    const stSesi=modeHistori?'selesai':sSesi(si.s,si.e);
    html+=`<tr>
      <td class="sesi${stSesi==='berlangsung'?' aktif':''}" style="font-size:11px;font-weight:900;color:${stSesi==='berlangsung'?'#4ade80':'rgba(255,255,255,0.3)'};">${nomorSesi}</td>
      <td class="sesi${stSesi==='berlangsung'?' aktif':''}">${si.s}<br>${si.e}</td>`;

    kls.forEach(kl=>{
      const j=jh.find(x=>x.kelas===kl&&x.jamMulai===si.s);
      if(!j){html+=`<td><div class="cell x"></div></td>`;return;}

      const absMasuk =dAbsensi.find(a=>a.kelas===kl&&a.tanggal===tgl&&a.mode==='masuk' &&a.guru===j.namaGuru);
      const absKeluar=dAbsensi.find(a=>a.kelas===kl&&a.tanggal===tgl&&a.mode==='keluar'&&a.guru===j.namaGuru);
      const kcData=absKeluar&&isKeluarCepat(absKeluar.jam,si.e)?absKeluar:null;
      // Cek kegiatan guru tertentu (sakit/izin/DL)
      const kgiGuru=cekKgiGuru(j.namaGuru,si.s,si.e,tgl);

      // Cek guru lama kelas sama — hijau jika belum keluar atau keluar tidak cepat
      let guruLamaHijau=false;
      for(let pi=idx-1;pi>=0;pi--){
        const siP=ses[pi];
        if(cekKgiSesi(siP.s,siP.e,hr,tgl)||siP.spOnly)continue;
        const jP=jh.find(x=>x.kelas===kl&&x.jamMulai===siP.s);
        if(jP&&jP.namaGuru!==j.namaGuru){
          const pM=dAbsensi.find(a=>a.kelas===kl&&a.tanggal===tgl&&a.mode==='masuk'&&a.guru===jP.namaGuru);
          const pK=dAbsensi.find(a=>a.kelas===kl&&a.tanggal===tgl&&a.mode==='keluar'&&a.guru===jP.namaGuru);
          if(pM&&(!pK||!isKeluarCepat(pK.jam,siP.e))) guruLamaHijau=true;
        }
        break;
      }

      const ditangani=dPenanganan.find(p=>p.kelas===kl&&p.tanggal===tgl&&p.jamMulai===si.s&&p.status!=='BATAL');

      let cls='a', ketLabel='', piketMark='';

      // ── Deteksi sesi berurutan ──
      // Cek apakah jam ini bagian dari sesi guru yang sama (berturut-turut)
      // Kalau iya, gunakan status jam yang sedang berlangsung
      function cekSesiSama(idxCek, arah){
        // arah: -1 = cek ke atas (jam sebelum), +1 = cek ke bawah (jam sesudah)
        let i=idxCek+arah;
        while(i>=0&&i<ses.length){
          const siX=ses[i];
          if(cekKgiSesi(siX.s,siX.e,hr,tgl)||siX.spOnly){i+=arah;continue;}
          const jX=jh.find(x=>x.kelas===kl&&x.jamMulai===siX.s);
          if(!jX||jX.namaGuru!==j.namaGuru) break;
          return siX; // ketemu jam berurutan dengan guru sama
        }
        return null;
      }

      // Cek apakah ada jam berurutan (sebelum atau sesudah) dengan guru sama yang berlangsung
      function statusSesiGabungan(){
        // Cek jam sebelumnya
        const siPrev=cekSesiSama(idx,-1);
        if(siPrev){
          const stPrev=sSesi(siPrev.s,siPrev.e);
          if(stPrev==='berlangsung') return 'berlangsung_sesi';
        }
        // Cek jam sesudahnya
        const siNext=cekSesiSama(idx,+1);
        if(siNext){
          const stNext=sSesi(siNext.s,siNext.e);
          if(stNext==='berlangsung') return 'berlangsung_sesi';
        }
        return null;
      }

      const sesiGabungan = statusSesiGabungan();

      if(stSesi==='akan'||stSesi==='toleransi'){
        if(kcData) cls='kc';
        else if(sesiGabungan) cls='m';
        else cls='b';
      }
      else if(stSesi==='berlangsung'){
        if(guruLamaHijau) cls='k';
        else if(kcData) cls='kc';
        else if(absMasuk) cls='h';
        else if(ditangani) cls='dt'; // ditangani — merah tua
        else if(kgiGuru){
          cls='mh';cntMH++;
          ketLabel=kgiGuru.keterangan;
          piketMark=kgiGuru.guruPiket;
        }
        else cls='m';
      } else {
        // Jam sudah selesai
        if(kcData) cls='kc';              // keluar cepat → tetap orange
        else if(absMasuk&&!absKeluar) cls='h'; // masih di kelas → hijau
        else if(ditangani) cls='dt';      // ditangani → merah tua
        else if(sesiGabungan) cls='m';    // bagian sesi berlangsung
        else cls='s';                     // kosong/berlalu → abu-abu
      }

      // Hitung counter — per kelas, hanya untuk jam yang sedang berlangsung/akan mulai
      if(stSesi==='berlangsung'||stSesi==='toleransi'||stSesi==='akan'){
        if(!kelasStatus[kl]) kelasStatus[kl]=cls;
        // Update jika status lebih prioritas
        const prioritas={'m':5,'a':5,'mh':4,'h':3,'kc':2,'k':1,'b':1,'dt':4};
        if((prioritas[cls]||0)>(prioritas[kelasStatus[kl]]||0)) kelasStatus[kl]=cls;
      }

      // Bangun isi sel
      let isi='';
      if(ketLabel) isi+=`<div class="cj" style="background:rgba(0,0,0,0.25);padding:1px 5px;border-radius:8px;color:#bfdbfe;margin-bottom:2px;">${ketLabel}</div>`;
      isi+=`<div class="cn">${j.kodeTampil||j.inisial}</div>`;
      if(cls==='kc') isi+=`<div class="cj">⚡ Keluar Cepat</div>`;
      if(cls==='h'&&absMasuk&&!absKeluar&&stSesi==='selesai') isi+=`<div class="cj">▶ di kelas</div>`;
      if(piketMark) isi+=`<div class="handle-mark">✓${piketMark}</div>`;

      html+=`<td><div class="cell ${cls}" style="position:relative;">${isi}</div></td>`;
    });
    html+='</tr>';
  });

  // Tally kelasStatus → counters
  Object.values(kelasStatus).forEach(cls=>{
    if(cls==='h') cntH++;
    else if(cls==='m'||cls==='a') cntM++;
    else if(cls==='mh'||cls==='dt') cntMH++;
    else if(cls==='k') cntK++;
    else if(cls==='kc') cntKC++;
  });

  html+='</tbody>';
  document.getElementById('tbl').innerHTML=html;
  document.getElementById('st-h').textContent=cntH+' Berlangsung';
  document.getElementById('st-m').textContent=cntM+' Kosong';
  document.getElementById('st-mh').textContent=cntMH+' Ditangani';
  document.getElementById('st-k').textContent=cntK+' Pergantian';
  document.getElementById('st-kc').textContent=cntKC+' Keluar Cepat';
  document.getElementById('last-refresh').textContent='Refresh: '+new Date().toLocaleTimeString('id-ID');
}

// ── State tanggal pilih ──
let tglDipilih = null; // null = hari ini (real-time)
let refreshPaused = false;

function gantiTanggal(val){
  tglDipilih = val;
  refreshPaused = true;
  document.getElementById('btn-hari-ini').style.display='inline-block';
  // Update indikator di footer
  const hariLabel=document.getElementById('hari-label');
  const d=new Date(val+'T00:00:00');
  const HARI_MAP=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  if(hariLabel) hariLabel.textContent='Melihat: '+HARI_MAP[d.getDay()]+', '+d.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  renderGrid(val);
}

function kembaliHariIni(){
  tglDipilih = null;
  refreshPaused = false;
  document.getElementById('btn-hari-ini').style.display='none';
  document.getElementById('tgl-picker').value='';
  const hariLabel=document.getElementById('hari-label');
  if(hariLabel) hariLabel.textContent='';
  renderGrid();
}

// Set tanggal hari ini di picker sebagai default
document.getElementById('tgl-picker').value = tglStr();

// ── Auto-scale + scroll ──
function applyScale(){
  const root=document.getElementById('scale-root');
  if(!root) return;
  const W=window.innerWidth;
  const H=window.innerHeight;
  if(H>=550){
    root.style.transform='';
    const cW=root.scrollWidth;
    const cH=root.scrollHeight;
    const scale=Math.min(W/cW, H/cH, 1);
    if(scale<1){
      root.style.transform=`scale(${scale})`;
      root.style.transformOrigin='top left';
      root.style.width=(W/scale)+'px';
      document.body.style.overflow='hidden';
    } else {
      root.style.transform='';
      root.style.width='';
      document.body.style.overflow='auto';
    }
  } else {
    root.style.transform='';
    root.style.width='';
    document.body.style.overflow='auto';
  }
}

// ── Fullscreen toggle ──
function toggleFullscreen(){
  const btn=document.getElementById('btn-fs');
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().then(()=>{
      if(btn) btn.textContent='✕';
      setTimeout(applyScale,300);
    }).catch(()=>{});
  } else {
    document.exitFullscreen().then(()=>{
      if(btn) btn.textContent='⛶';
      setTimeout(applyScale,300);
    }).catch(()=>{});
  }
}
document.addEventListener('fullscreenchange',()=>{
  const btn=document.getElementById('btn-fs');
  if(btn) btn.textContent=document.fullscreenElement?'✕':'⛶';
  setTimeout(applyScale,300);
});

// ── loadData override untuk mode histori ──
const _origLoadData=loadData;
loadData=async function(){
  if(refreshPaused) return; // pause kalau lagi lihat tanggal lain
  await _origLoadData.apply(this,arguments);
};

loadData();
setInterval(()=>{ if(!refreshPaused) loadData(); }, 30000);
setInterval(cekBelOtomatis, 15000);
setTimeout(applyScale, 300);
window.addEventListener('resize', applyScale);
const _origRenderGrid=renderGrid;
renderGrid=function(tglArg){
  _origRenderGrid.call(this, tglArg);
  setTimeout(applyScale,100);
};
